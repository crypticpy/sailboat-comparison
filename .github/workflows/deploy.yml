name: Deploy to GitHub Pages

# Builds the Vite app and publishes dist/ to GitHub Pages.
#
# Before this runs successfully (Phase 3 cutover), in the repo settings:
#   - Settings → Pages → Build and deployment → Source: "GitHub Actions"
#   - Settings → Secrets and variables → Actions → New repository secret:
#       VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY
# The anon key is publishable (RLS is the security boundary), but it's kept in
# a secret so the value isn't editable by forks/PRs. Until the secrets are set,
# the build falls back to the bundled data/boats.json.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
