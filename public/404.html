<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting…</title>
    <!--
      SPA fallback for GitHub Pages. A direct hit on /sailboat-comparison/boat/:id
      404s on a static host; this rewrites the URL into a query string and bounces
      to the app's index, where the snippet in index.html restores the real path
      before React Router boots. pathSegmentsToKeep = 1 keeps the project subpath.
      Technique: rafgraph/spa-github-pages (MIT).
    -->
    <script>
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
